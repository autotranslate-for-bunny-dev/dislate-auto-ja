name: Build and deploy

on:
    push:
        branches: [main]

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - uses: actions/checkout@v4

            - name: Prepare environment
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install deps
              run: npm ci

            - name: Build plugin(s)
              run: npm run build

            - name: Copy additional files
              run: |
                  cp README.md dist/README.md
                  cat <<'EOF' > dist/dislate/index.html
                  <!doctype html>
                  <html lang="en">
                  <head>
                      <meta charset="utf-8">
                      <meta name="viewport" content="width=device-width, initial-scale=1">
                      <title>Dislate Auto-JA Plugin Files</title>
                      <style>
                          body {
                              margin: 0;
                              padding: 32px 20px;
                              font-family: "Avenir Next", "Helvetica Neue", sans-serif;
                              background: #f6f7f2;
                              color: #1c211c;
                          }
                          main {
                              max-width: 720px;
                              margin: 0 auto;
                              padding: 24px;
                              border-radius: 24px;
                              background: #fffdf6;
                              border: 1px solid #d5ddd5;
                          }
                          h1 {
                              margin-top: 0;
                              font-size: 32px;
                          }
                          p, li {
                              line-height: 1.7;
                              color: #4c5b4f;
                          }
                          a {
                              color: #146356;
                          }
                      </style>
                  </head>
                  <body>
                      <main>
                          <h1>Dislate Auto-JA</h1>
                          <p>This is the Bunny plugin source directory. In Bunny, add this directory URL as the plugin source.</p>
                          <ul>
                              <li><a href="./manifest.json">manifest.json</a></li>
                              <li><a href="./index.js">index.js</a></li>
                          </ul>
                      </main>
                  </body>
                  </html>
                  EOF
                  cat <<'EOF' > dist/index.html
                  <!doctype html>
                  <html lang="en">
                  <head>
                      <meta charset="utf-8">
                      <meta name="viewport" content="width=device-width, initial-scale=1">
                      <title>Dislate Auto-JA</title>
                      <style>
                          :root {
                              color-scheme: light;
                              --bg: #f6f7f2;
                              --panel: #fffdf6;
                              --ink: #1c211c;
                              --muted: #5e6a60;
                              --accent: #146356;
                              --accent-soft: #e2f0ea;
                              --border: #d5ddd5;
                          }
                          * { box-sizing: border-box; }
                          body {
                              margin: 0;
                              font-family: "Avenir Next", "Helvetica Neue", sans-serif;
                              background: radial-gradient(circle at top left, #edf6df 0, transparent 34%), linear-gradient(180deg, #f9fbf6 0%, var(--bg) 100%);
                              color: var(--ink);
                              min-height: 100vh;
                          }
                          main { max-width: 880px; margin: 0 auto; padding: 48px 20px 64px; }
                          .card {
                              background: var(--panel);
                              border: 1px solid var(--border);
                              border-radius: 28px;
                              padding: 28px;
                              box-shadow: 0 18px 40px rgba(20, 99, 86, 0.08);
                          }
                          .eyebrow {
                              display: inline-block;
                              padding: 8px 12px;
                              border-radius: 999px;
                              background: var(--accent-soft);
                              color: var(--accent);
                              font-size: 13px;
                              letter-spacing: 0.06em;
                              text-transform: uppercase;
                          }
                          h1 { margin: 16px 0 12px; font-size: clamp(32px, 5vw, 56px); line-height: 1; }
                          p { margin: 0 0 16px; color: var(--muted); font-size: 18px; line-height: 1.6; }
                          .url-box {
                              margin-top: 24px;
                              padding: 18px;
                              border-radius: 18px;
                              background: #17211b;
                              color: #f4f7f1;
                              overflow-wrap: anywhere;
                              font-size: 15px;
                              line-height: 1.6;
                          }
                          .grid {
                              display: grid;
                              grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                              gap: 16px;
                              margin-top: 24px;
                          }
                          .panel {
                              background: rgba(255, 255, 255, 0.84);
                              border: 1px solid var(--border);
                              border-radius: 20px;
                              padding: 18px;
                          }
                          .panel strong {
                              display: block;
                              margin-bottom: 8px;
                              font-size: 14px;
                              letter-spacing: 0.04em;
                              text-transform: uppercase;
                              color: var(--accent);
                          }
                          a { color: var(--accent); }
                      </style>
                  </head>
                  <body>
                      <main>
                          <section class="card">
                              <span class="eyebrow">Bunny Plugin</span>
                              <h1>Dislate Auto-JA</h1>
                              <p>Auto-translates non-Japanese server messages into Japanese on Bunny, while keeping DM translation manual through long-press or <code>/translate</code>.</p>
                              <p>Copy the plugin source URL below and add it from the Bunny Plugins screen.</p>
                              <div class="url-box">https://autotranslate-for-bunny-dev.github.io/dislate-auto-ja/dislate/</div>
                              <div class="grid">
                                  <article class="panel">
                                      <strong>Repository</strong>
                                      <a href="https://github.com/autotranslate-for-bunny-dev/dislate-auto-ja">Open GitHub repo</a>
                                  </article>
                                  <article class="panel">
                                      <strong>Manifest</strong>
                                      <a href="./dislate/manifest.json">Open manifest.json</a>
                                  </article>
                                  <article class="panel">
                                      <strong>Bundle</strong>
                                      <a href="./dislate/index.js">Open index.js</a>
                                  </article>
                              </div>
                          </section>
                      </main>
                  </body>
                  </html>
                  EOF
                  cat <<'EOF' > dist/404.html
                  <!doctype html>
                  <html lang="en">
                  <head>
                      <meta charset="utf-8">
                      <meta http-equiv="refresh" content="0; url=/dislate-auto-ja/">
                      <meta name="viewport" content="width=device-width, initial-scale=1">
                      <title>Dislate Auto-JA</title>
                  </head>
                  <body>
                      <p>Redirecting to <a href="/dislate-auto-ja/">Dislate Auto-JA</a>...</p>
                  </body>
                  </html>
                  EOF

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./dist

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
